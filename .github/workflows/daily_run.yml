name: Daily News Web-scrapping Script Run

on:
  schedule:
    - cron: '0 18 * * *'  # Runs the script daily at 6 p.m. UTC
  workflow_dispatch:  # Allows manual triggering

jobs:
  run-nlp-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v2
        with:
          auto-update-conda: true

      - name: Create conda environment
        run: conda env create -f environment.yml

      - name: List files before execution
        run: ls -la

      - name: Verify notebook file exists
        run: |
          if [ ! -f Scripts/web_scrapping.ipynb ]; then echo "Notebook not found!"; exit 1; fi
        shell: bash

      - name: Run Jupyter Notebook
        run: |
          set -x
          conda run -n nlp-env jupyter nbconvert --to notebook --execute Scripts/web_scrapping.ipynb --output result.ipynb --debug
        shell: bash

      - name: List files after execution
        run: ls -la

      - name: Display content of result.ipynb
        if: success()
        run: cat result.ipynb
        shell: bash

      - name: Convert notebook to HTML
        if: success()
        run: |
          conda run -n nlp-env jupyter nbconvert --to html result.ipynb
        shell: bash

      - name: Commit results
        if: success()
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add result.ipynb result.html
          git commit -m "Daily NLP script run"
          git push
        shell: bash